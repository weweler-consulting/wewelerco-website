name: Deploy PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: read
  pull-requests: write

jobs:
  deploy-preview:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Surfer CLI
        run: npm install -g cloudron-surfer

      - name: Deploy to preview subfolder
        id: deploy
        run: |
          BRANCH="${{ github.head_ref }}"
          SAFE_BRANCH=$(echo "$BRANCH" | sed 's/[^a-zA-Z0-9._-]/-/g' | tr '[:upper:]' '[:lower:]')
          echo "safe_branch=$SAFE_BRANCH" >> "$GITHUB_OUTPUT"

          surfer put \
            --server ${{ secrets.SURFER_URL }} \
            --token ${{ secrets.SURFER_TOKEN }} \
            --delete \
            public/* /preview/$SAFE_BRANCH/

      - name: Comment preview link on PR
        uses: actions/github-script@v7
        env:
          SURFER_URL: ${{ secrets.SURFER_URL }}
          SAFE_BRANCH: ${{ steps.deploy.outputs.safe_branch }}
        with:
          script: |
            const surferUrl = process.env.SURFER_URL.replace(/\/$/, '');
            const safeBranch = process.env.SAFE_BRANCH;
            const previewUrl = `${surferUrl}/preview/${safeBranch}/`;
            const sha = context.payload.pull_request.head.sha.substring(0, 7);

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const marker = '<!-- surfer-preview -->';
            const existing = comments.find(c => c.body.includes(marker));

            const body = [
              marker,
              `### Preview Deployment`,
              '',
              `| | |`,
              `|---|---|`,
              `| **URL** | ${previewUrl} |`,
              `| **Branch** | \`${context.payload.pull_request.head.ref}\` |`,
              `| **Commit** | \`${sha}\` |`,
            ].join('\n');

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  cleanup-preview:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest

    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Surfer CLI
        run: npm install -g cloudron-surfer

      - name: Delete preview subfolder
        run: |
          BRANCH="${{ github.event.pull_request.head.ref }}"
          SAFE_BRANCH=$(echo "$BRANCH" | sed 's/[^a-zA-Z0-9._-]/-/g' | tr '[:upper:]' '[:lower:]')

          surfer del \
            --server ${{ secrets.SURFER_URL }} \
            --token ${{ secrets.SURFER_TOKEN }} \
            "/preview/$SAFE_BRANCH" 2>/dev/null || true
