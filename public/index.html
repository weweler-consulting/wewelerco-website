<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weweler & Co. – Wir bauen Unternehmen auf.</title>
  <meta name="description" content="Weweler & Co. ist eine Beteiligungsgesellschaft, die Unternehmen aufbaut.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background: #faf9f7;
      color: #0f2137;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      -webkit-font-smoothing: antialiased;
    }

    .name {
      font-family: 'Instrument Serif', Georgia, serif;
      font-size: clamp(2.5rem, 6vw, 4.5rem);
      font-weight: 400;
      letter-spacing: -0.01em;
      margin-bottom: 0.5rem;
    }

    .claim {
      font-size: clamp(1rem, 2.5vw, 1.25rem);
      font-weight: 300;
      color: #4d5f73;
      margin-bottom: 3rem;
    }

    .email a {
      font-size: 0.95rem;
      font-weight: 400;
      color: #0f2137;
      text-decoration: none;
      border-bottom: 1px solid #e5e2dc;
      padding-bottom: 2px;
      transition: border-color 0.3s;
    }

    .email a:hover {
      border-color: #0f2137;
    }

    .legal {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      display: flex;
      gap: 1.5rem;
    }

    .legal a {
      font-size: 0.75rem;
      color: #7a8a9a;
      text-decoration: none;
      transition: color 0.3s;
    }

    .legal a:hover {
      color: #0f2137;
    }
  </style>
</head>
<body>
  <h1 class="name">Weweler & Co.</h1>
  <p class="claim">Wir bauen Unternehmen auf.</p>
  <p class="email"><a href="mailto:justus@weweler.co">justus@weweler.co</a></p>
  <div class="legal">
    <a href="/impressum.html">Impressum</a>
    <a href="/datenschutz.html">Datenschutz</a>
  </div>
</body>
</html>
